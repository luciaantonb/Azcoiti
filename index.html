<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Landing Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/nav.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      font-family: 'Inter Tight', sans-serif;
    }

    /* ── Page wrapper: full viewport, no scroll ── */
    .home {
      width: 100%;
      height: 100vh;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: 90px;
    }

    /* ── HEADER via nav.css ── */

    /* ── Tile grid ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(2, 1fr);
      width: 100%;
      min-height: 0;
    }

    .tile {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      cursor: pointer;
      transition: filter 0.3s ease;
      overflow: hidden;
      min-height: 0;
    }
    .tile:hover {
      filter: brightness(1.05);
      z-index: 10;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tile-text {
      color: rgba(0, 0, 0, 1);
      font-size: clamp(14px, 1.4vw, 20px);
      font-family: 'MD Lorien Trial', Georgia, serif;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.03em;
      text-align: center;
      pointer-events: none;
      z-index: 2;
      width: 70%;
      padding-top: clamp(16px, 4%, 30px);
    }

    /* ── Tile colours ── */
    #tile-1  { background-color: rgba(254, 69,  12,  1); }
    #tile-3  { background-color: rgba(192, 190, 169, 1); }
    #tile-5  { background-color: rgba(55,  172, 251, 1); }
    #tile-6  { background-color: rgba(158,  11,  11, 1); }
    #tile-7  { background-color: rgba(68,  142, 122, 1); }
    #tile-8  { background-color: rgba(229, 196, 230, 1); }
    #tile-10 { background-color: rgba(208, 255, 113, 1); }
    #tile-12 { background-color: rgba(255, 135, 229, 1); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .home { padding-top: 70px; }  /* extra space so header doesn't overlap tiles */
      main { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); }
    }
    @media (max-width: 480px) {
      .home { padding-top: 62px; }  /* extra space on mobile */
      main { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(6, 1fr); }
      .tile-text { font-size: clamp(11px, 3vw, 16px); }
    }
  </style>
</head>
<body>

<div class="home">

  <!-- ── HEADER ── -->
  <header>
    <img class="logo"
      src="https://storage.googleapis.com/storage.magicpath.ai/user/397403131929063424/figma-assets/04da8ae3-0b31-45e3-a9e9-73b35570fb03.png"
      alt="Azcoiti" onclick="window.location.href='index.html'" />
    <span class="nav-tagline">Pattern Creation</span>
    <nav class="nav-links">
      <button class="nav-link" onclick="window.location.href='generator.html'">Generator</button>
      <button class="nav-link" onclick="window.location.href='pages/artwork.html'">Artwork</button>
      <button class="nav-link" onclick="window.location.href='about.html'">About</button>
    </nav>
      <button class="nav-icon" aria-label="Isotype">
    <img id="isotype-img" src="images/isotipo-04.png" alt="Isotype" />
  </button>
  <script>
    (function() {
      var imgs = ['images/isotipo-04.png', 'images/isotipo-05.png', 'images/isotipo-06.png'];
      var i = 0;
      setInterval(function() {
        i = (i + 1) % imgs.length;
        var el = document.getElementById('isotype-img');
        if (el) el.src = imgs[i];
      }, 2000);
    })();
  </script>
  </header>

  <!-- ── Tiles ── -->
  <main>

    <!-- Row 1 -->
    <div class="tile" id="tile-1">
      <span class="tile-text">A tool to help you slow down</span>
    </div>

    <div class="tile" id="tile-2">
      <img
        src="https://storage.googleapis.com/storage.magicpath.ai/user/397403131929063424/figma-assets/a196fe84-2564-481e-9a1c-d61338e47413.svg"
        alt="Pattern graphic"
      />
    </div>

    <div class="tile" id="tile-3">
      <span class="tile-text">Turn Data Into Patterns</span>
    </div>

    <div class="tile" id="tile-4">
      <img
        src="https://storage.googleapis.com/storage.magicpath.ai/user/397403131929063424/figma-assets/1b63b924-b0aa-4ea1-afd3-ffa4be22c469.svg"
        alt="Pattern graphic"
      />
    </div>

    <div class="tile" id="tile-5">
      <span class="tile-text">Information, woven</span>
    </div>

    <div class="tile" id="tile-6">
      <span class="tile-text">The world rewards speed. We reward attention.</span>
    </div>

    <!-- Row 2 -->
    <div class="tile" id="tile-7">
      <span class="tile-text">Made to matter</span>
    </div>

    <div class="tile" id="tile-8">
      <span class="tile-text">Binary logic transformed</span>
    </div>

    <div class="tile" id="tile-9">
      <img
        src="https://storage.googleapis.com/storage.magicpath.ai/user/397403131929063424/figma-assets/f6050f16-2312-471c-b1cd-2f7032070f66.svg"
        alt="Pattern graphic"
      />
    </div>

    <div class="tile" id="tile-10">
      <span class="tile-text">When did your clothes stop meaning something?</span>
    </div>

    <div class="tile" id="tile-11">
      <img
        src="https://storage.googleapis.com/storage.magicpath.ai/user/397403131929063424/figma-assets/728f137e-adce-43ef-b91d-7f89cdf71c99.svg"
        alt="Pattern graphic"
      />
    </div>

    <div class="tile" id="tile-12">
      <span class="tile-text">Reason before form</span>
    </div>

  </main>
</div>


<footer style="position:fixed; bottom:16px; right:20px; font-size:11px; font-family:'Inter Tight',sans-serif; color:rgba(0,0,0,0.4); letter-spacing:0.04em; pointer-events:none; z-index:100;">© 2026 AZCOITI</footer>
</body>
</html>
