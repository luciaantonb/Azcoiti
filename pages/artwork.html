<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artwork — Azcoiti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/nav.css" />
  <style>
    @font-face {
      font-family: 'MDLorien';
      src: url('../fonts/MDLorien-Regular.otf') format('opentype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      font-family: 'Inter Tight', sans-serif;
      color: #000;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── PAGE LAYOUT ── */
    .page {
      position: fixed;
      top: 90px; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: flex-end;     /* cards sit at bottom */
      padding: 0 18px 60px 18px; /* bottom gap for labels */
      gap: 0;
    }

    /* ── ARTWORK GRID ── 
       5 equal columns with a small gap between them
    */
    .grid {
      display: flex;
      align-items: flex-end;    /* all cards grow upward from same baseline */
      gap: 8px;
      width: 100%;
      height: 100%;
    }

    /* ── CARD COLUMN ── */
    .card-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;  /* image sits at bottom, label below */
      height: 100%;
      cursor: pointer;
    }

    .card-img {
      width: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: filter 0.3s ease, transform 0.3s ease;
    }

    .card-col:hover .card-img {
      filter: brightness(0.92);
      transform: translateY(-4px);
    }

    /* ── CARD LABEL ── */
    .card-label {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding-top: 10px;
      padding-bottom: 0;
    }

    .card-num {
      font-size: 13px;
      font-family: 'Inter Tight', sans-serif;
      font-weight: 500;
      line-height: 1.2;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .card-title {
      font-size: 15px;
      font-family: 'MDLorien', Georgia, serif;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    /* ── PER-CARD HEIGHTS (% of available space above label area) ──
       Matching reference proportions:
       01 tallest, 02 shorter, 03 medium, 04 shortest, 05 tallest
    */
    .card-col:nth-child(1) .card-img { height: 76%; }
    .card-col:nth-child(2) .card-img { height: 40%; }
    .card-col:nth-child(3) .card-img { height: 57%; }
    .card-col:nth-child(4) .card-img { height: 45%; }
    .card-col:nth-child(5) .card-img { height: 72%; }

    /* ── RESPONSIVE — vertical scrollable list on mobile ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; height: auto; }

      .page {
        position: static;
        display: block;
        padding: 96px 32px 60px 32px;
      }

      .grid {
        flex-direction: column;
        align-items: stretch;
        height: auto;
        gap: 56px;
        width: 100%;
      }

      .card-col {
        flex: none;
        width: 100%;
        height: auto;
        justify-content: flex-start;
      }

      .card-img {
        width: 100%;
        object-fit: cover;
        display: block;
      }

      /* Varying heights mirroring desktop proportions:
         01 tallest, 02 short, 03 medium-tall, 04 short, 05 tallest */
      .card-col:nth-child(1) .card-img { height: 90vw; }
      .card-col:nth-child(2) .card-img { height: 55vw; }
      .card-col:nth-child(3) .card-img { height: 72vw; }
      .card-col:nth-child(4) .card-img { height: 60vw; }
      .card-col:nth-child(5) .card-img { height: 86vw; }

      .card-label { padding: 14px 0 0 0; }
      .card-title { font-size: 18px; }
      .card-num   { font-size: 13px; }
    }

    @media (max-width: 480px) {
      .page { padding: 96px 20px 60px 20px; }
      .card-col:nth-child(1) .card-img { height: 95vw; }
      .card-col:nth-child(2) .card-img { height: 58vw; }
      .card-col:nth-child(3) .card-img { height: 76vw; }
      .card-col:nth-child(4) .card-img { height: 63vw; }
      .card-col:nth-child(5) .card-img { height: 90vw; }
      .card-title { font-size: 16px; }
    }
  </style>
</head>
<body>

    <button class="nav-icon" aria-label="Isotype">
